<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Vigil IoT | Reset Password</title>
    <link rel="icon" type="image/svg+xml" href="assets/images/vigil-logo.svg">
    <link rel="stylesheet" href="assets/css/reset-page.css">
  </head>
  <body data-reset-token="__TOKEN__">
    <div class="drift-layer" id="drift-layer" aria-hidden="true"></div>

    <main class="reset-shell">
      <section class="reset-card" aria-labelledby="reset-title">
        <header class="reset-header">
          <img class="reset-logo" src="assets/images/vigil-logo.svg" alt="Vigil IoT logo">
          <div class="reset-title-wrap">
            <h1 id="reset-title">Reset Your Password</h1>
            <p class="reset-subtitle">Create a new password for your Vigil IoT account.</p>
          </div>
        </header>

        <form class="reset-form" id="reset-form" novalidate>
          <div class="field-group">
            <label for="new-password">New password</label>
            <div class="password-input-wrapper has-validation">
              <input id="new-password" name="new-password" type="password" autocomplete="new-password" required>
              <button
                type="button"
                id="password-validation-toggle"
                class="password-validation-toggle is-invalid"
                aria-label="Password rule status"
                aria-describedby="new-password-validation-tooltip"
              >
                ?
                <span id="new-password-validation-tooltip" role="tooltip" class="password-validation-tooltip">
                  <ul id="new-password-validation-list"></ul>
                </span>
              </button>
              <button
                type="button"
                class="password-toggle"
                data-target="new-password"
                aria-label="Show password"
                aria-pressed="false"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 5c-5.52 0-9.86 3.74-11 7 1.14 3.26 5.48 7 11 7s9.86-3.74 11-7c-1.14-3.26-5.48-7-11-7zm0 12c-4.22 0-7.68-2.9-8.86-5 1.18-2.1 4.64-5 8.86-5s7.68 2.9 8.86 5c-1.18 2.1-4.64 5-8.86 5zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"></path>
                </svg>
              </button>
            </div>
          </div>

          <div class="field-group">
            <label for="confirm-password">Confirm password</label>
            <div class="password-input-wrapper has-validation">
              <input id="confirm-password" name="confirm-password" type="password" autocomplete="new-password" required>
              <button
                type="button"
                id="confirm-password-validation-toggle"
                class="password-validation-toggle is-invalid"
                aria-label="Confirm password status"
                aria-describedby="confirm-password-validation-tooltip"
              >
                ?
                <span id="confirm-password-validation-tooltip" role="tooltip" class="password-validation-tooltip">
                  <ul id="confirm-password-validation-list"></ul>
                </span>
              </button>
              <button
                type="button"
                class="password-toggle"
                data-target="confirm-password"
                aria-label="Show password"
                aria-pressed="false"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 5c-5.52 0-9.86 3.74-11 7 1.14 3.26 5.48 7 11 7s9.86-3.74 11-7c-1.14-3.26-5.48-7-11-7zm0 12c-4.22 0-7.68-2.9-8.86-5 1.18-2.1 4.64-5 8.86-5s7.68 2.9 8.86 5c-1.18 2.1-4.64 5-8.86 5zm0-8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"></path>
                </svg>
              </button>
            </div>
          </div>

          <p class="reset-rule">
            Use at least 8 characters with uppercase, lowercase, a number, and a symbol.
          </p>

          <button class="reset-submit" id="reset-btn" type="submit">Reset Password</button>
          <p id="message" class="reset-message" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>
    <script src="assets/js/reset-page.js" defer></script>
  </body>
</html>
